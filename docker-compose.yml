services:
  db:
    image: postgres:16
    container_name: cine_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      # Persiste os dados mesmo após docker compose down
      - pgdata:/var/lib/postgresql/data
      # Roda o SQL de inicialização na primeira vez que o container sobe
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cine_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cine_app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Sobrescreve o DATABASE_URL para usar o nome do serviço "db" (DNS interno do Compose)
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cine_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
